# ═══════════════════════════════════════════════════════════════════════════════
# CARVanta — Automated Data Pipeline
# ═══════════════════════════════════════════════════════════════════════════════
# Runs weekly: fetches real data from TCGA/GTEx/UniProt,
# updates the database, and triggers model retraining if needed.

name: Data Pipeline

on:
  schedule:
    # Run every Monday at 3:00 AM UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:
    # Allow manual trigger

env:
  PYTHON_VERSION: "3.12"

jobs:
  ingest:
    name: Data Ingestion & Update
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: pipeline
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CARVANTA_API_KEY_DEV: ${{ secrets.CARVANTA_API_KEY_DEV }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 1: Fetch latest data from public APIs
      - name: Fetch real biomarker data
        run: python data/real_data_fetcher.py
        timeout-minutes: 30

      # Step 2: Build and update database
      - name: Build real database
        run: python data/build_real_database.py
        timeout-minutes: 15

      # Step 3: Classify biomarkers
      - name: Classify biomarkers
        run: python data/classify_biomarkers.py

      # Step 4: Seed database
      - name: Seed database
        run: python db/seed.py

      # Step 5: Run model validation
      - name: Validate model performance
        run: python verify_rankings.py
        continue-on-error: true

      # Notify on completion
      - name: Pipeline summary
        run: |
          echo "✓ Data pipeline completed at $(date -u)"
          echo "→ Database updated with latest biomarker data"
